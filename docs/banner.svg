<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="s2g" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="s1g" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="#ffffff0e"/>
    </pattern>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="155%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000070"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#dotgrid)"/>

  <!-- Top / Bottom accent bars -->
  <rect x="0" y="0"   width="1200" height="4" fill="url(#topbar)"/>
  <rect x="0" y="396" width="1200" height="4" fill="url(#topbar)"/>

  <!-- Panel divider -->
  <line x1="430" y1="30" x2="430" y2="370" stroke="#ffffff0f" stroke-width="1"/>

  <!-- Atmosphere glow blobs -->
  <ellipse cx="620"  cy="200" rx="300" ry="160" fill="#8b5cf610"/>
  <ellipse cx="1000" cy="200" rx="220" ry="130" fill="#0369a110"/>

  <!-- ═══════════════════════════════════
       LEFT PANEL
       ═══════════════════════════════════ -->

  <!-- Mini lego brick logo -->
  <circle cx="66" cy="70" r="10" fill="#9333ea"/>
  <circle cx="90" cy="70" r="10" fill="#9333ea"/>
  <rect x="52" y="70" width="52" height="30" rx="6" fill="#7c3aed"/>
  <circle cx="63" cy="65" r="4" fill="#ffffff25"/>
  <circle cx="87" cy="65" r="4" fill="#ffffff25"/>

  <!-- Title -->
  <text x="116" y="102"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="52" font-weight="700" fill="#f8fafc" letter-spacing="-1">LegoNav</text>

  <!-- Tagline -->
  <text x="52" y="132"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="2">MODULAR VISUAL LANGUAGE NAVIGATION</text>

  <!-- Gradient underline -->
  <rect x="52" y="144" width="240" height="2" rx="1" fill="url(#topbar)"/>

  <!-- Feature: S2 -->
  <rect x="52" y="163" width="12" height="12" rx="3" fill="#8b5cf6"/>
  <text x="72" y="174"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#c4b5fd">S2 — Visual Language Model</text>
  <text x="72" y="191"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748b">Qwen2.5-VL · Qwen3-VL · GPT-4o · Gemini · Kimi</text>

  <!-- Feature: S1 -->
  <rect x="52" y="208" width="12" height="12" rx="3" fill="#38bdf8"/>
  <text x="72" y="219"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#7dd3fc">S1 — Navigation Policy</text>
  <text x="72" y="236"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748b">NavDP · GNM · ViNT · NoMaD · DD-PPO · iPlanner</text>

  <!-- Feature: Modular -->
  <rect x="52" y="253" width="12" height="12" rx="3" fill="#06b6d4"/>
  <text x="72" y="264"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="600" fill="#67e8f9">Plug &amp; Play · Any S1 × Any S2</text>
  <text x="72" y="281"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#64748b">Jetson Edge · ROS2 Humble · Python 3.10</text>

  <!-- Badges -->
  <rect x="52"  y="316" width="78" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="91"  y="331" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8b949e">MIT License</text>

  <rect x="140" y="316" width="78" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="179" y="331" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8b949e">Python 3.10</text>

  <rect x="228" y="316" width="90" height="22" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="273" y="331" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8b949e">ROS2 Humble</text>

  <!-- ═══════════════════════════════════
       RIGHT PANEL — Brick Diagram
       ═══════════════════════════════════ -->

  <!-- ── S2 Brick ── -->
  <!-- Body: x=490–710, y=155–267 -->
  <rect x="490" y="155" width="220" height="112" rx="12" fill="url(#s2g)" filter="url(#shadow)"/>
  <!-- Bottom shade (3-D depth) -->
  <rect x="490" y="245" width="220" height="22" rx="6" fill="#00000028"/>
  <!-- 3 Studs -->
  <circle cx="540" cy="155" r="18" fill="#9333ea" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="600" cy="155" r="18" fill="#9333ea" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="660" cy="155" r="18" fill="#9333ea" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Stud inner ring -->
  <circle cx="540" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <circle cx="600" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <circle cx="660" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <!-- Stud highlights -->
  <circle cx="534" cy="149" r="5" fill="#ffffff30"/>
  <circle cx="594" cy="149" r="5" fill="#ffffff30"/>
  <circle cx="654" cy="149" r="5" fill="#ffffff30"/>
  <!-- Label -->
  <text x="600" y="208" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="34" font-weight="700" fill="#ffffff">S2</text>
  <text x="600" y="233" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" fill="#e9d5ff">Visual Language Model</text>
  <!-- Below-brick model names -->
  <text x="600" y="292" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#475569">Qwen2.5-VL · Qwen3-VL</text>
  <text x="600" y="308" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#475569">GPT-4o · Gemini · Kimi</text>

  <!-- ── Arrow S2 → S1 ── -->
  <line x1="716" y1="211" x2="792" y2="211" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="789,204 803,211 789,218" fill="#06b6d4"/>
  <text x="754" y="200" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#06b6d4">pixel goal</text>

  <!-- ── S1 Brick ── -->
  <!-- Body: x=803–1023, y=155–267 -->
  <rect x="803" y="155" width="220" height="112" rx="12" fill="url(#s1g)" filter="url(#shadow)"/>
  <!-- Bottom shade -->
  <rect x="803" y="245" width="220" height="22" rx="6" fill="#00000028"/>
  <!-- 3 Studs -->
  <circle cx="853" cy="155" r="18" fill="#0ea5e9" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="913" cy="155" r="18" fill="#0ea5e9" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="973" cy="155" r="18" fill="#0ea5e9" stroke="#0284c7" stroke-width="1.5"/>
  <!-- Stud inner rings -->
  <circle cx="853" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <circle cx="913" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <circle cx="973" cy="155" r="10" fill="none" stroke="#00000020" stroke-width="2"/>
  <!-- Stud highlights -->
  <circle cx="847" cy="149" r="5" fill="#ffffff30"/>
  <circle cx="907" cy="149" r="5" fill="#ffffff30"/>
  <circle cx="967" cy="149" r="5" fill="#ffffff30"/>
  <!-- Label -->
  <text x="913" y="208" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="34" font-weight="700" fill="#ffffff">S1</text>
  <text x="913" y="233" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif"
        font-size="12" fill="#bae6fd">Navigation Policy</text>
  <!-- Below-brick model names -->
  <text x="913" y="292" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#475569">NavDP · GNM · ViNT · NoMaD</text>
  <text x="913" y="308" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#475569">DD-PPO · iPlanner · ViPlanner</text>

  <!-- ── Arrow S1 → Robot ── -->
  <line x1="1029" y1="211" x2="1082" y2="211" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="1079,204 1093,211 1079,218" fill="#06b6d4"/>
  <text x="1060" y="200" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#06b6d4">trajectory</text>

  <!-- ── Robot Icon ── -->
  <g transform="translate(1096,172)">
    <!-- Antenna -->
    <line x1="44" y1="-22" x2="44" y2="2" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="44" cy="-26" r="5" fill="#06b6d4" filter="url(#glow)"/>
    <!-- Head -->
    <rect x="16" y="2" width="56" height="36" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- Eyes (LED rectangles) -->
    <rect x="25" y="11" width="14" height="9" rx="3" fill="#06b6d4"/>
    <rect x="49" y="11" width="14" height="9" rx="3" fill="#06b6d4"/>
    <rect x="25" y="11" width="14" height="9" rx="3" fill="#06b6d4" filter="url(#glow)" opacity="0.5"/>
    <rect x="49" y="11" width="14" height="9" rx="3" fill="#06b6d4" filter="url(#glow)" opacity="0.5"/>
    <!-- Mouth grill -->
    <line x1="29" y1="28" x2="59" y2="28" stroke="#38bdf840" stroke-width="1.5" stroke-dasharray="4 3"/>
    <!-- Body -->
    <rect x="8" y="42" width="72" height="46" rx="6" fill="#1e293b" stroke="#0284c7" stroke-width="1.5"/>
    <!-- Body detail bars -->
    <rect x="20" y="52" width="48" height="7" rx="3" fill="#0369a145"/>
    <rect x="20" y="65" width="30" height="5" rx="2" fill="#0369a135"/>
    <!-- Wheels -->
    <circle cx="22"  cy="100" r="14" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="22"  cy="100" r="6"  fill="#0ea5e9"/>
    <circle cx="66" cy="100" r="14" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="66" cy="100" r="6"  fill="#0ea5e9"/>
  </g>
  <!-- Robot label -->
  <text x="1140" y="304" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#94a3b8">Mobile Robot</text>
  <text x="1140" y="318" text-anchor="middle"
        font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#475569">Jetson · ROS2</text>

  <!-- Decorative lego stud grid (top-right corner) -->
  <g opacity="0.10" transform="translate(1138,18)">
    <circle cx="0"  cy="0"  r="9" fill="#8b5cf6"/>
    <circle cx="24" cy="0"  r="9" fill="#8b5cf6"/>
    <circle cx="48" cy="0"  r="9" fill="#8b5cf6"/>
    <circle cx="0"  cy="24" r="9" fill="#06b6d4"/>
    <circle cx="24" cy="24" r="9" fill="#06b6d4"/>
    <circle cx="48" cy="24" r="9" fill="#06b6d4"/>
  </g>
</svg>
